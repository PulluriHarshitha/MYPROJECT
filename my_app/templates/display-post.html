{% extends 'base.html' %}
{% block title %}
<title>posts</title>
{% endblock title %}
{% block content %}
<h1>posts</h1>
<hr>

<div style = "width : 100; height: 100;">
{% for post in post_list %}

<div class="card" style="width: 48rem;  margin: 10px auto;">
  <img src="{{ post.image.url }}" class="card-img-top" alt="cards">
  <div class="card-body">
    <h5 class="card-title">{{ post.title }}</h5>
    <p class="card-text">{{ post.subtitle }}</p>
    <a href="#" class="btn btn-primary">Read more</a>
  </div>
</div>

{% endfor %}
{% endblock content %}
